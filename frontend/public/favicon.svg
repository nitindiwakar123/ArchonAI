<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="primary_gradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#007bff" /> <stop offset="100%" stop-color="#22d3ee" /> </linearGradient>

    <filter id="neon_bloom" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="#007bff" flood-opacity="0.8"/>
      <feDropShadow dx="0" dy="0" stdDeviation="3.5" flood-color="#22d3ee" flood-opacity="0.6"/>
    </filter>
  </defs>

  <g filter="url(#neon_bloom)">
    <path 
      d="M50,8 L95,85 H80 L50,25 L20,85 H5 Z" 
      fill="url(#primary_gradient)" 
      stroke="#22d3ee" 
      stroke-width="1.5" 
      stroke-linejoin="round"
    />

    <path 
      d="M38,60 L50,45 L62,60 M50,45 V35" 
      fill="none" 
      stroke="#22d3ee" 
      stroke-width="1.5" 
      stroke-linecap="round"
    />
    
    <circle cx="50" cy="52" r="4" fill="#22d3ee">
      <animate 
        attributeName="r" 
        values="3.5;4;3.5" 
        dur="1.5s" 
        repeatCount="indefinite" 
      />
    </circle>
  </g>
</svg>
